project:
  type: book
  output-dir: docs
  render: 
  - "*.qmd"      # Only render QMD files
  - "!slides/"   # EXPLICITLY IGNORE this folder for rendering
  resources: 
  - slides/
  - images/   #if we need an images folder

book:
  title: "Barcelona"
  author: "Christy Choi, Entao Wang, Jiaying Li, Tianyi Chen, Yanxi Ren"
  date: "3/9/2026"
  navbar:
    background: light
    search: true
    reader-mode: true
    right:
      - icon: github
        href: "https://github.com/christychoicc/RSCE_GROUP"
  chapters:
    - index.qmd
    - presentation.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      #- cosmo
      #- brand
      light: [cosmo, flatly]
      dark: [cosmo, darkly]
    code-link: true

editor: visual

