# Barcelona
### High Solar Potential, Low Energy Self-sufficiency
.pull-left-wide[
- **Potential**: 7.9M m² suitable roof area, where flat and slightly inclined terraces account for 67% of total roof surface; Generation potential of 1,191 GWh/year, around 60% of domestic electricity demand

- **Low realisation**: City produces just **1%** of its own energy, only **5%** of households have solar installations

- **Core Issue**: Barcelona has potential but the rooftops are under utilised for the city 
]

# Key Problems and Issues

Despite strong policy frameworks, the situation remains concerning...

- Renewable energy generation remains underdeveloped at both local and regional scale
- Current installations are concentrated in public and municipal buildings
- Ageing housing stock; 81% of properties have a low energy performance rating (E, F, or G)
- Energy poverty persists, energy bills exceed 10% of household income for many households
- Renewable transition is slow; energy system still relies on centralised, non-renewable sources
- A major Iberian power outage exposed the fragility of Spain's centralised energy system in April 2025, underlining the urgency of strengthening energy sources and distributed solar deployment

&lt;div style="background: #722f37; color: white; padding: 10px 16px; border-radius: 6px; font-size: 0.9em; margin-top: 1em;"&gt;
The challenge is not the absence of policy or resources but &lt;span style="font-weight: bold;"&gt;implementation&lt;/span&gt;.
&lt;/div&gt;

# Analysis of Barcelona’s Current Solar Dashboard

### 1. *Resource Potential*

  --**Incident Solar Radiation:** Currently provided as a qualitative rating (e.g., "Very Good"). 

  --**Solar Irradiated Surface Area:** The total roof area receiving effective sunlight (`\(m^2\)`) 

### 2. *Performance Data*

 --**Effective Usable Area:** Net rooftop area available for PV installation after general setbacks. 

 --**Installable Capacity:** Potential peak power output measured in `\(kW\)`. 

 --**Annual Energy Generation:** Estimated yearly electricity production in `\(kWh/year\)` 

 --**Common Area Consumption Coverage:** Indicates that the generation covers more than `\(100\%\)` of the building's shared areas' energy needs. 

### 3. *Environmental Impact* 

 --**GHG Emissions Savings:** Measured in `\(kgCO_2eq/year\)` to align with SDG 13 (Climate Action). 

### 4. *Economic Assessment* 

 --**Estimated Investment Cost:** Initial capital expenditure (`\(€\)`) for the installation. 

 --**Estimated Maintenance Cost:** Yearly operational expenses (`\(€/year\)`) 

 --**Estimated Financial Savings:** Annual reduction in electricity bills (`\(€/year\)`).

# Research Question: 4 GAPs

--
### 1 The "Static" Gap: 
Current data dashboard provides a 'snapshot' of theoretical potential but cannot monitor the actual progress of solar installations in real-time. 

(Without knowing what is already "on the roof," the city cannot track its progress toward Global Development Goals (e.g., SDG 7).) 
--

### 2 The "Precision" Gap: 
Small obstacles (chimneys, HVAC) are often ignored, leading to a 20% overestimation of usable area. (resulting in unrealistic financial expectations for citizens and flawed energy planning for the city.) 
--

---
class: inverse, center, middle
# Research Question: 4 GAPs
--

### 3 The "Integration" Gap:  
The dashboard does not place Barcelona in a broader background context (e.g., comparable spatial and policy indicators).
--

### 4 The "Future" Gap:
The dashboard provides limited support for understanding future development potential.

---
# Our Solution

1. Use remote sensing data to reduce the cost and turnaround time of data updates.
2. Use Machine Learning methods to better understand the current solar panel distribution.
3. Fit Barcelona into a broader policy context by providing additional policy-relevant layers.
4. Add more ways to calculate and prioritise the huge potential rooftop area.

# Methodology - Step 1.2: OBIA
**1. Multiresolution Segmentation** 
  - Aggregates spectrally similar pixels into geographically meaningful objects to mitigate "salt-and-pepper" noise.
        
**2. Geometric Constraints**
  - Leverages physical attributes—including aspect ratio, rectangularity, and area—to filter out non-PV entities (e.g., circular water tanks).
        
**3. Spectral-Spatial Integration**
  - Evaluates object regularity alongside spectral signatures to significantly reduce false-positive rates.
        
**4. Vectorized Output** 
  - Facilitates the direct export of GIS-compliant polygonal boundaries, streamlining precise surface area calculations.

# Methodology - Step 3: Multispectral Indices
*Assessing Urban Resilience and Environmental Context using Sentinel-2*

.panelset[
.panel[.panel-name[🌿 NDVI (Vegetation)]
**Definition:** The Normalized Difference Vegetation Index quantifies vegetation health and density by measuring the difference between near-infrared (which vegetation strongly reflects) and red light.  
**Formula:** `\(NDVI = \frac{NIR - Red}{NIR + Red}\)`

**Purpose in Project:** Identifies existing green roofs and street-level tree canopies. It helps exclude tree-shaded areas from PV potential and flags vegetation-poor neighborhoods (low NDVI) as high-priority zones for **"Biosolar" (PV + Green Roof) subsidies** to mitigate heat risk.

**Literature Support:** [Weng et al. (2004)](https://doi.org/10.1016/j.rse.2003.11.005) demonstrated a strong negative correlation between NDVI and Land Surface Temperature (LST), validating NDVI as a crucial metric for mapping urban heat vulnerability.
]

.panel[.panel-name[💧 NDWI (Water)]
**Definition:** The Normalized Difference Water Index enhances water features while eliminating soil and terrestrial vegetation features.  
**Formula:** `\(NDWI = \frac{Green - NIR}{Green + NIR}\)`

**Purpose in Project:** Acts as a strict **spatial mask**. Barcelona is a coastal city; NDWI automatically delineates the Mediterranean Sea, inland water bodies, and large rooftop swimming pools, ensuring these flat surfaces are not falsely identified as viable solar potential areas by the algorithms.

**Literature Support:** [McFeeters (1996)](https://doi.org/10.1080/01431169608948714) introduced NDWI to successfully delineate open water features and suppress non-water noise in urban and environmental remote sensing.
]

.panel[.panel-name[🏗️ NDBI (Built-up)]
**Definition:** The Normalized Difference Built-up Index highlights urban areas of barren soil, concrete, and asphalt, which reflect shortwave infrared (SWIR) stronger than NIR.  
**Formula:** `\(NDBI = \frac{SWIR - NIR}{SWIR + NIR}\)`

**Purpose in Project:** Maps the density of the built environment (e.g., the Eixample district). High NDBI strongly correlates with **severe Urban Heat Islands (UHI)**. Overlapping high NDBI with our "Solar Gap" allows the city to target rooftop PV as a physical shading mechanism to cool down the most exposed concrete blocks.

**Literature Support:** [Guo et al. (2015)](https://doi.org/10.1016/j.landurbplan.2014.11.007) explored the quantitative relationship between urban biophysical composition and heat, proving that NDBI is the primary driver of increased Land Surface Temperature in dense urban clusters.
]
]

Step 2 gives us the 'How much, exactly and where they can actually fit'  

We focus on four key dimensions:
shade
slope
aspect
elevation

Using LiDAR, our Ray-tracing filters out shadows and identifies Slope to subtract 3D obstacles like chimneys/HVAC UNITS.   

Specifically, Notice the Aspect: because of Barcelona’s unique Superblock grid, in this context, solar panels are perfectly aligned—either North-South or orthogonal to the streets.  


[Shade: Through Dynamic Ray-tracing, we simulate shadows from sunrise to sunset. This tells us exactly which roofs are blocked by taller buildings or trees, filtering out 'low-value' surfaces.

Slope: It identifies if a roof is flat or pitched, and more importantly, it helps our algorithm detect and subtract 3D obstacles like chimneys or AC units to find the Net Usable Area.

Aspect:  Look at the pattern here. Because of Barcelona’s unique Superblock (Cerdà Grid) layout, rooftop orientations are remarkably regular. Most panels are either aligned North-South or placed orthogonal to the street grid, perfectly integrating solar technology with the city’s iconic urban landscape.

Elevation: This provides the vertical context, accounting for height differences that affect solar exposure and the 'Urban Canyon' effect.]

## Multiple Index Synthesis


.formula-accordion[

&lt;details open class="orange-panel"&gt;

&lt;summary&gt;1. Precision: Net Solar Potential Gap (`\(E_{gap}\)`)&lt;/summary&gt;
&lt;div class="formula-content"&gt;
`$$E_{gap} = [ (A_{roof} \times f_{obs}) - A_{exist} ] \times \left( \sum_{h=1}^{8760} G_{h} \times \text{Shade}_h \right) \times \eta_{sys} \times PR$$`
&lt;/div&gt;
&lt;/details&gt;

&lt;details class="green-panel"&gt;&lt;summary&gt;2. Climate: Carbon Gap Tracking (`\(\Delta CO_2\)`)&lt;/summary&gt;

&lt;div class="formula-content"&gt;
`$$\Delta CO_2(t) = \text{Target}_{2030} - [ \sum (\text{Stock}_{detected} + \text{Potential}_{Egap}) \times EF_{grid} ]$$`
&lt;/div&gt;
&lt;/details&gt;

&lt;details class="pink-panel"&gt;&lt;summary&gt;3. Economy: Dynamic ROI (`\(T_{payback}\)`)&lt;/summary&gt;

&lt;div class="formula-content"&gt;

`$$T_{payback} = \frac{Cost_{invest}}{\sum_{y=1}^{n} [ (Yield \times SSR \times P_{buy}) + (Yield \times (1-SSR) \times P_{sell}) - Cost_{maint} ]}$$`
&lt;/div&gt;
&lt;/details&gt;

&lt;details class="blue-panel"&gt;&lt;summary&gt;4. Equity: Social Equity Index (`\(SEI\)`)&lt;/summary&gt;
&lt;div class="formula-content"&gt;
`$$SEI = \text{Norm}(Score_{gap}) \times \left( 1 - \frac{\text{District\_Income}}{\text{City\_Avg\_Income}} \right)$$`
&lt;/div&gt;
&lt;/details&gt;]

# Data Feasibility Analysis
*Evaluating the strengths and limitations of our Earth Observation data sources.*

### 🤖 Step 1: PV Mapping

**Main data source: Airbus Pléiades Neo (30 cm)**

**Advantage:** 30 cm RGB imagery plus infrared and Near Infrared (NIR) bands for PV vs. non-PV discrimination.

**Disadvantage:** Higher acquisition cost.

--

**Supplementary data source: Cartographic and Geological Institute of Catalonia (ICGC)**

**Advantage:** 25 cm RGB plus infrared imagery to improve classification detail and robustness.

**Disadvantage:** Does not provide NIR, so generalisation may require careful transfer learning.

---
# Data Feasibility Analysis
*Evaluating the strengths and limitations of our Earth Observation data sources.*

### ⛰️ Step 2: Potential Layers

**Main data source: ICGC LiDAR (Terrain &amp; Shadows)**

**Advantage:** 
1. Very high resolution surface elevation (DEM/DSM) and robust derivation of slope and aspect.
2. Supports shadow modelling and incidence-geometry correction for solar potential calculations.

**Disadvantage (Assumption):** LiDAR-derived features may be insufficient alone for complex rooftop cases, so ML + rule-based corrections are needed for final obstacle handling and PV mapping.

---
# Data Feasibility Analysis
*Evaluating the strengths and limitations of our Earth Observation data sources.*

### 🌍 Step 3: Context &amp; Indicators

**Main data source: Sentinel-2**

**Advantage:** 10 m imagery and derived indices (RGB, NDVI, NDBI, NDWI) available since 2015.

**Disadvantage:** Limited spatial detail for rooftop-scale signatures; cloud availability issues.

--

**Supplementary data source: Sentinel-3**

**Advantage:** Complementary thermal/heat-map style context at low cost (useful for broader environmental interpretation).

**Disadvantage:** Coarser resolution; used for city-scale context rather than rooftop-level detection.
